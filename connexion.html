<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#f0a500"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BiblioAfrik"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — BiblioAfrik</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    .auth-page { min-height:100vh; background:linear-gradient(135deg,#1a1a2e,#0f3460); display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .auth-box { background:var(--surface); border-radius:24px; padding:45px 40px; width:100%; max-width:420px; box-shadow:0 25px 60px rgba(0,0,0,0.3); }
    .auth-logo { text-align:center; margin-bottom:30px; }
    .auth-logo span { font-size:2.5rem; }
    .auth-logo h2 { color:var(--text); font-size:1.6rem; margin:8px 0 5px; }
    .auth-logo p { color:var(--gray); font-size:0.88rem; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:7px; color:var(--text); }
    .form-group input { width:100%; padding:13px 18px; border:2px solid var(--border); border-radius:10px; font-family:'Poppins',sans-serif; font-size:0.9rem; background:var(--bg); color:var(--text); outline:none; transition:border-color 0.3s; }
    .form-group input:focus { border-color:#f0a500; }
    .btn-auth { width:100%; padding:14px; background:#f0a500; color:#1a1a2e; border:none; border-radius:10px; font-family:'Poppins',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.3s; margin-top:5px; }
    .btn-auth:hover { background:#0f3460; color:white; transform:translateY(-2px); }
    .auth-link { text-align:center; margin-top:20px; font-size:0.88rem; color:var(--gray); }
    .auth-link a { color:#f0a500; font-weight:600; text-decoration:none; }
    .erreur { color:#e74c3c; font-size:0.85rem; margin-top:12px; text-align:center; display:none; }
    .succes { color:#2ecc71; font-size:0.9rem; margin-top:12px; text-align:center; display:none; font-weight:600; }
  </style>
</head>
<body>

  <nav style="position:fixed;top:0;left:0;right:0;z-index:1000;">
    <div class="logo">📚 BiblioAfrik</div>
    <ul><li><a href="index.html">← Retour à l'accueil</a></li></ul>
    <button class="dark-toggle" id="darkToggle">🌙</button>
  </nav>

  <div class="auth-page" style="padding-top:80px;">
    <div class="auth-box">
      <div class="auth-logo">
        <span>🔐</span>
        <h2>Se connecter</h2>
        <p>Content de te revoir sur BiblioAfrik !</p>
      </div>

      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="email" placeholder="ton@email.com"/>
      </div>

      <div class="form-group">
        <label>🔒 Mot de passe</label>
        <input type="password" id="password" placeholder="Ton mot de passe"/>
      </div>

      <p class="erreur" id="erreur">❌ Email ou mot de passe incorrect.</p>
      <div class="succes" id="succes">✅ Connexion réussie ! Redirection...</div>

      <button class="btn-auth" onclick="seConnecter()">
        🔓 Se connecter
      </button>

      <div class="auth-link" style="margin-top:15px;">
        Pas encore de compte ? <a href="inscription.html">S'inscrire gratuitement →</a>
      </div>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    if (localStorage.getItem('theme') === 'dark') { html.setAttribute('data-theme','dark'); toggle.textContent='☀️'; }
    toggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      toggle.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });

    document.addEventListener('keypress', e => { if (e.key === 'Enter') seConnecter(); });

    function seConnecter() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const erreurEl = document.getElementById('erreur');

      if (!email || !password) {
        erreurEl.textContent = '⚠️ Remplis tous les champs.';
        erreurEl.style.display = 'block'; return;
      }

      let membres = JSON.parse(localStorage.getItem('biblioafrik_membres') || '[]');
      const membre = membres.find(m => m.email === email && m.password === password);

      if (!membre) {
        erreurEl.style.display = 'block'; return;
      }

      localStorage.setItem('biblioafrik_user_actif', JSON.stringify(membre));
      erreurEl.style.display = 'none';
      document.getElementById('succes').style.display = 'block';
      setTimeout(() => { window.location.href = 'profil.html'; }, 1200);
    }
  </script>
</body>
</html>
